services:
  book-factory:
    build: .
    ports:
      - "8008:8008"
    env_file:
      - .env
    environment:
      # Nadpisuje .env — baza na trwałym wolumenie (przetrwa docker compose down bez -v)
      DATABASE_URL: sqlite:////app/data/book_factory.db
      BOOK_FACTORY_DB_PATH: /app/data/book_factory.db
      BOOK_FACTORY_BACKUP_DIR: /app/data/backups
      BOOK_FACTORY_BACKUP_KEEP: 30
    volumes:
      - ./data:/app/data
    restart: unless-stopped
